<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetris Floor Crawler</title>
    <style>
        :root {
            --bg-color: #050508;
            --panel-color: #0f0f16;
            --border-color: #222233;
            --accent-color: #ffd54f;
            --text-color: #e2e2eb;
            --hp-color: #ef5350;
            --block-accent: #29b6f6;
            --hero-accent: #66bb6a;
        }

        html, body {
            overflow: hidden;
            height: 100%;
            position: fixed; 
            width: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
        }

        body {
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; 
        }

        #game-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 390px;
            height: 100%;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 5px;
        }

        /* Handheld Split-Screen (Map left, Stats right) */
        #viewport-split {
            display: flex;
            flex-direction: row;
            width: 100%;
            gap: 6px;
            align-items: stretch;
            flex-grow: 1;
            min-height: 0; 
            padding-top: 2px;
        }

        #canvas-container {
            flex: 1.1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            border: 2px solid var(--border-color);
            background-color: #020205;
            width: 100%;
            height: auto;
            max-height: 100%;
            display: block;
            border-radius: 6px;
            image-rendering: pixelated;
        }

        #sidebar-panel {
            flex: 0.9;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 5px;
            box-sizing: border-box;
            font-size: 11px;
            gap: 4px;
        }

        .sidebar-card {
            background-color: #141420;
            border: 1px solid #252538;
            border-radius: 4px;
            padding: 5px;
        }
        .card-title {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #777;
            margin-bottom: 2px;
            font-weight: bold;
        }

        .hp-bar-container {
            width: 100%;
            background-color: #333;
            height: 4px;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 3px;
        }
        .hp-bar-fill {
            height: 100%;
            background-color: var(--hp-color);
            width: 100%;
            transition: width 0.15s ease;
        }

        #next-preview-box {
            font-family: monospace;
            font-size: 10px;
            line-height: 1.1;
            text-align: center;
            min-height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Micro Log Panel */
        #log-panel {
            flex-grow: 1;
            overflow-y: auto;
            font-family: monospace;
            font-size: 10px;
            display: flex;
            flex-direction: column-reverse;
            gap: 2px;
            max-height: 70px;
        }
        .log-entry { line-height: 1.1; }
        .log-neutral { color: #8a9ba8; }
        .log-damage { color: #ff6b6b; }
        .log-success { color: #51cf66; }
        .log-tetris { color: #cc5de8; font-weight: bold; }

        /* Twin D-PAD Controls Container */
        #controls-layout {
            display: flex;
            flex-direction: row; 
            justify-content: space-around;
            background-color: var(--panel-color);
            padding: 8px 4px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            gap: 6px;
        }

        .dpad-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .dpad-title {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #666;
            margin-bottom: 4px;
            font-weight: bold;
        }

        .dpad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 3px;
            width: 120px;
            height: 120px;
        }

        .dpad-btn {
            background-color: #141420;
            border: 1px solid #252538;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .dpad-btn:active {
            background-color: var(--accent-color);
            color: #000;
        }
        .dpad-empty {
            visibility: hidden;
        }

        .block-btn { border-color: var(--block-accent); color: #81d4fa; }
        .block-btn:active { background-color: var(--block-accent); color: #000; }

        .hero-btn { border-color: var(--hero-accent); color: #a5d6a7; }
        .hero-btn:active { background-color: var(--hero-accent); color: #000; }
        .hero-wait-btn { background-color: #1b5e20; }

        /* Game Over Overlay Screen */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(5, 5, 8, 0.95);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 24px;
        }
        .modal-card {
            background-color: var(--panel-color);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.8);
        }
        .modal-title {
            color: var(--hp-color);
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .restart-btn {
            background-color: var(--hero-accent);
            border: none;
            color: #000;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <!-- Handheld Split-Screen View -->
    <div id="viewport-split">
        <div id="canvas-container">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div id="sidebar-panel">
            <div class="sidebar-card">
                <div class="card-title">Hero Status</div>
                <div style="font-weight: bold;">❤️ HP: <span id="stat-hp">35/35</span></div>
                <div class="hp-bar-container">
                    <div id="hp-bar" class="hp-bar-fill"></div>
                </div>
                <div style="margin-top: 3px;">🪜 Floor: <span id="stat-floor">1</span></div>
                <div style="margin-top: 2px; font-size: 9px; color:#aaa;">Tick Rate: <span id="stat-rate">3</span> Act</div>
            </div>

            <div class="sidebar-card">
                <div class="card-title">Score</div>
                <div style="font-size: 12px; font-weight: bold; color: var(--accent-color);" id="stat-score">0</div>
            </div>

            <div class="sidebar-card">
                <div class="card-title">Next Piece</div>
                <div id="next-preview-box">Loading...</div>
            </div>

            <div class="sidebar-card" style="flex-grow: 1; display: flex; flex-direction: column;">
                <div class="card-title">Dungeon Feed</div>
                <div id="log-panel"></div>
            </div>
        </div>
    </div>

    <!-- Symmetrical Twin D-PAD Controllers -->
    <div id="controls-layout">
        <!-- Left D-PAD: Block manipulation with Soft Drop -->
        <div class="dpad-container">
            <div class="dpad-title" style="color: var(--block-accent)">Block (Tetris)</div>
            <div class="dpad-grid">
                <div class="dpad-empty"></div>
                <button class="dpad-btn block-btn" onclick="game.handleBlockRotate()">🔄</button>
                <div class="dpad-empty"></div>

                <button class="dpad-btn block-btn" onclick="game.handleBlockLeft()">◀</button>
                <button class="dpad-btn block-btn" style="background-color: #0d47a1; color:#fff;" onclick="game.handleBlockDrop()">⏬</button>
                <button class="dpad-btn block-btn" onclick="game.handleBlockRight()">▶</button>

                <div class="dpad-empty"></div>
                <button class="dpad-btn block-btn" onclick="game.handleBlockSoftDrop()">▼</button>
                <div class="dpad-empty"></div>
            </div>
        </div>

        <!-- Right D-PAD: Hero exploration -->
        <div class="dpad-container">
            <div class="dpad-title" style="color: var(--hero-accent)">Hero (Rogue)</div>
            <div class="dpad-grid">
                <div class="dpad-empty"></div>
                <button class="dpad-btn hero-btn" onclick="game.handleHeroMove(0, -1)">▲</button>
                <div class="dpad-empty"></div>

                <button class="dpad-btn hero-btn" onclick="game.handleHeroMove(-1, 0)">◀</button>
                <button class="dpad-btn hero-btn hero-wait-btn" onclick="game.handleHeroWait()">⏺</button>
                <button class="dpad-btn hero-btn" onclick="game.handleHeroMove(1, 0)">▶</button>

                <div class="dpad-empty"></div>
                <button class="dpad-btn hero-btn" onclick="game.handleHeroMove(0, 1)">▼</button>
                <div class="dpad-empty"></div>
            </div>
        </div>
    </div>
</div>

<!-- Game Over Overlay Screen -->
<div id="game-over-modal" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-title" id="death-title">DUNGEON COLLAPSE</div>
        <p style="color: #888; margin: 5px 0 15px 0;" id="death-reason">Dungeon ceiling collapsed.</p>
        <div style="text-align: left; padding: 10px; background-color: #0c0c12; border-radius: 4px; font-size: 13px;">
            <p style="margin: 4px 0;">🪜 Depth Floor: <b id="final-floor" style="color: var(--accent-color);">1</b></p>
            <p style="margin: 4px 0;">🏆 Final Score: <b id="final-score" style="color: var(--accent-color);">0</b></p>
        </div>
        <button class="restart-btn" onclick="restartRun()">Try Again</button>
    </div>
</div>

<script>
// ==========================================
// 1. ENGINE CONFIGURATION & DATA DICTS
// ==========================================
const CONFIG = {
    COLS: 10, 
    ROWS: 15, 
    TILE_SIZE: 17
};

const TILE = { VOID: 0, FLOOR: 1, STAIRS: 2 };

const CELL_STATE = {
    EMPTY: 0,
    FLOOR: 1,
    MONSTER_RAT: 2,
    MONSTER_SKEL: 3,
    ITEM_POTION: 4,
    ITEM_SWORD: 5,
    STAIRS: 6
};

const SHAPES = {
    I: { matrix: [[1,1,1,1]], color: "#4fc3f7" },
    O: { matrix: [[1,1],[1,1]], color: "#fff176" },
    T: { matrix: [[0,1,0],[1,1,1]], color: "#ba68c8" },
    S: { matrix: [[0,1,1],[1,1,0]], color: "#81c784" },
    Z: { matrix: [[1,1,0],[0,1,1]], color: "#e57373" },
    J: { matrix: [[1,0,0],[1,1,1]], color: "#7986cb" },
    L: { matrix: [[0,0,1],[1,1,1]], color: "#ffb74d" }
};

const NEXT_PREVIEWS = {
    I: "🩵🩵🩵🩵",
    O: "💛💛<br>💛💛",
    T: " &nbsp;💜<br>💜💜💜",
    S: " &nbsp;💚💚<br>💚💚",
    Z: "❤️❤️<br> &nbsp;❤️❤️",
    J: "💙<br>💙💙💙",
    L: " &nbsp; &nbsp;🧡<br>🧡🧡🧡"
};

// ==========================================
// 2. CHARACTER STATE DEFINITIONS
// ==========================================
class Player {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.char = "🧙‍♂️";
        this.hp = 35;
        this.maxHp = 35;
        this.atk = 6;
    }
    heal(amount) {
        const prev = this.hp;
        this.hp = Math.min(this.maxHp, this.hp + amount);
        return this.hp - prev;
    }
    takeDamage(amount) {
        this.hp = Math.max(0, this.hp - amount);
        return amount;
    }
}

class Monster {
    constructor(x, y, char, name, hp, atk) {
        this.x = x;
        this.y = y;
        this.char = char;
        this.name = name;
        this.hp = hp;
        this.maxHp = hp;
        this.atk = atk;
    }
}

class Item {
    constructor(x, y, char, name, type, statValue) {
        this.x = x;
        this.y = y;
        this.char = char;
        this.name = name;
        this.type = type;
        this.statValue = statValue;
    }
}

class Particle {
    constructor(x, y, text, color) {
        this.x = x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
        this.y = y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
        this.text = text;
        this.color = color;
        this.life = 1.0;
    }
    update() {
        this.y -= 0.5;
        this.life -= 0.05;
    }
    draw(ctx) {
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.font = "bold 9px monospace";
        ctx.fillText(this.text, this.x - ctx.measureText(this.text).width / 2, this.y);
        ctx.restore();
    }
}

// ==========================================
// 3. MAIN GAME CORE ENGINE
// ==========================================
class Game {
    constructor() {
        if (window.gameInstance) {
            window.gameInstance.active = false;
        }
        window.gameInstance = this;
        this.active = true;

        this.canvas = document.getElementById("gameCanvas");
        this.ctx = this.canvas.getContext("2d");
        this.canvas.width = CONFIG.COLS * CONFIG.TILE_SIZE;
        this.canvas.height = CONFIG.ROWS * CONFIG.TILE_SIZE;

        this.map = Array(CONFIG.COLS).fill(null).map(() => Array(CONFIG.ROWS).fill(TILE.VOID));
        this.colors = Array(CONFIG.COLS).fill(null).map(() => Array(CONFIG.ROWS).fill(null));

        this.player = new Player(4, 13);
        this.monsters = [];
        this.items = [];
        this.particles = [];

        this.score = 0;
        this.dungeonLevel = 1;
        this.moveCounter = 0;
        this.blocksPlacedSinceStairs = 0;

        this.generateStartPlatform();

        this.currentType = this.getRandomShapeKey();
        this.nextType = this.getRandomShapeKey();
        this.spawnBlock();

        this.startLoop();
        this.updateUi();

        if (!window.keyEventBound) {
            window.addEventListener("keydown", (e) => {
                if (window.gameInstance && window.gameInstance.player.hp > 0) {
                    window.gameInstance.handleKeyboard(e);
                }
            });
            window.keyEventBound = true;
        }
    }

    generateStartPlatform() {
        for (let x = 2; x < 8; x++) {
            this.map[x][13] = TILE.FLOOR;
            this.colors[x][13] = "#333344";
            this.map[x][14] = TILE.FLOOR;
            this.colors[x][14] = "#333344";
        }
    }

    getRandomShapeKey() {
        const keys = Object.keys(SHAPES);
        return keys[Math.floor(Math.random() * keys.length)];
    }

    spawnBlock() {
        this.currentType = this.nextType;
        this.nextType = this.getRandomShapeKey();
        const baseMatrix = SHAPES[this.currentType].matrix;
        this.blockColor = SHAPES[this.currentType].color;

        this.blocksPlacedSinceStairs++;
        let stairsInjected = false;

        this.blockMatrix = baseMatrix.map(row => row.map(cell => {
            if (cell === 0) return CELL_STATE.EMPTY;

            if (!stairsInjected && (this.blocksPlacedSinceStairs >= 8 || Math.random() < 0.10)) {
                stairsInjected = true;
                this.blocksPlacedSinceStairs = 0;
                return CELL_STATE.STAIRS;
            }

            const rand = Math.random();
            if (rand < 0.12) {
                return Math.random() < 0.5 ? CELL_STATE.MONSTER_RAT : CELL_STATE.MONSTER_SKEL;
            } else if (rand < 0.20) {
                return Math.random() < 0.6 ? CELL_STATE.ITEM_POTION : CELL_STATE.ITEM_SWORD;
            }
            return CELL_STATE.FLOOR;
        }));

        this.blockX = Math.floor((CONFIG.COLS - this.blockMatrix[0].length) / 2);
        this.blockY = 0;

        // Classic Tetris Game Over Condition: Block immediately collides upon spawning
        if (this.checkBlockCollision(this.blockX, this.blockY, this.blockMatrix)) {
            this.handleDeath("DUNGEON OVERFLOW", "Masonry blocks stacked to the ceiling!");
        }
    }

    checkBlockCollision(bx, by, matrix) {
        for (let r = 0; r < matrix.length; r++) {
            for (let c = 0; c < matrix[r].length; c++) {
                if (matrix[r][c] !== CELL_STATE.EMPTY) {
                    const tx = bx + c;
                    const ty = by + r;

                    if (tx < 0 || tx >= CONFIG.COLS || ty >= CONFIG.ROWS) return true;
                    if (ty >= 0 && this.map[tx][ty] !== TILE.VOID) return true;
                }
            }
        }
        return false;
    }

    rotateMatrix(matrix) {
        const rows = matrix.length;
        const cols = matrix[0].length;
        const rotated = Array(cols).fill(null).map(() => Array(rows).fill(0));
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                rotated[c][rows - 1 - r] = matrix[r][c];
            }
        }
        return rotated;
    }

    lockBlock() {
        for (let r = 0; r < this.blockMatrix.length; r++) {
            for (let c = 0; c < this.blockMatrix[r].length; c++) {
                const cell = this.blockMatrix[r][c];
                if (cell !== CELL_STATE.EMPTY) {
                    const tx = this.blockX + c;
                    const ty = this.blockY + r;

                    if (tx >= 0 && tx < CONFIG.COLS && ty >= 0 && ty < CONFIG.ROWS) {
                        // Set solidified cell flooring (SQUISH logic completely removed)
                        if (cell === CELL_STATE.STAIRS) {
                            this.map[tx][ty] = TILE.STAIRS;
                            this.colors[tx][ty] = "#8e24aa"; 
                        } else {
                            this.map[tx][ty] = TILE.FLOOR;
                            this.colors[tx][ty] = this.blockColor;
                        }

                        // Spawn riding active entities on locked land
                        if (cell === CELL_STATE.MONSTER_RAT) {
                            const hp = 10 + (this.dungeonLevel - 1) * 2;
                            const atk = 3 + (this.dungeonLevel - 1);
                            this.monsters.push(new Monster(tx, ty, "🐀", "Cave Rat", hp, atk));
                            this.spawnParticle(tx, ty, "👾 Spawn", "#e57373");
                        } else if (cell === CELL_STATE.MONSTER_SKEL) {
                            const hp = 18 + (this.dungeonLevel - 1) * 3;
                            const atk = 5 + (this.dungeonLevel - 1);
                            this.monsters.push(new Monster(tx, ty, "💀", "Skeleton Guard", hp, atk));
                            this.spawnParticle(tx, ty, "👾 Spawn", "#e57373");
                        } else if (cell === CELL_STATE.ITEM_POTION) {
                            this.items.push(new Item(tx, ty, "🧪", "Health Potion", "heal", 15));
                        } else if (cell === CELL_STATE.ITEM_SWORD) {
                            this.items.push(new Item(tx, ty, "🗡️", "Steel Sword", "stat", 3));
                        }
                    }
                }
            }
        }

        this.checkLineClears();
        this.spawnBlock();
    }

    checkLineClears() {
        let rowsCleared = 0;

        for (let y = CONFIG.ROWS - 1; y >= 0; y--) {
            let rowFull = true;
            for (let x = 0; x < CONFIG.COLS; x++) {
                if (this.map[x][y] === TILE.VOID) {
                    rowFull = false;
                    break;
                }
            }

            if (rowFull) {
                rowsCleared++;

                for (let x = 0; x < CONFIG.COLS; x++) {
                    this.map[x][y] = TILE.VOID;
                    this.colors[x][y] = null;
                }

                for (let shiftY = y; shiftY > 0; shiftY--) {
                    for (let x = 0; x < CONFIG.COLS; x++) {
                        this.map[x][shiftY] = this.map[x][shiftY - 1];
                        this.colors[x][shiftY] = this.colors[x][shiftY - 1];
                    }
                }
                for (let x = 0; x < CONFIG.COLS; x++) {
                    this.map[x][0] = TILE.VOID;
                    this.colors[x][0] = null;
                }

                this.shiftEntitiesDown(y);
                y++; 
            }
        }

        if (rowsCleared > 0) {
            const baseValue = [0, 100, 300, 600, 1000];
            const added = (baseValue[rowsCleared] || 1200) * this.dungeonLevel;
            this.score += added;

            const lineHeal = this.player.heal(10);
            if (lineHeal > 0) {
                this.spawnParticle(this.player.x, this.player.y, `+${lineHeal} HP`, "#69f0ae");
                logMessage(`Row collapsed! Clear reward: +${lineHeal} HP.`, "log-tetris");
            } else {
                logMessage(`Dungeon Row Cleared! +${added} Score.`, "log-tetris");
            }
        }
    }

    shiftEntitiesDown(thresholdY) {
        for (const m of this.monsters) {
            if (m.y < thresholdY) m.y++;
        }
        for (const i of this.items) {
            if (i.y < thresholdY) i.y++;
        }
        if (this.player.y < thresholdY) {
            this.player.y++;
            if (this.player.y >= CONFIG.ROWS) {
                this.transitionToNextFloor();
            }
        }
    }

    transitionToNextFloor() {
        this.dungeonLevel++;
        logMessage(`Collapsed down to depth floor ${this.dungeonLevel}!`, "log-tetris");
        this.resetDungeonState();
    }

    resetDungeonState() {
        this.map = Array(CONFIG.COLS).fill(null).map(() => Array(CONFIG.ROWS).fill(TILE.VOID));
        this.colors = Array(CONFIG.COLS).fill(null).map(() => Array(CONFIG.ROWS).fill(null));
        this.monsters = [];
        this.items = [];

        this.player.x = 4;
        this.player.y = 13;
        this.generateStartPlatform();
        this.spawnBlock();
    }

    // ==========================================
    // ROGUELIKE ACTION TICKS
    // ==========================================
    advanceTurn() {
        if (this.player.hp <= 0) return;
        this.moveCounter++;

        const currentGravityRate = Math.max(1, 4 - Math.floor(this.dungeonLevel / 2));

        if (this.moveCounter % currentGravityRate === 0) {
            if (!this.checkBlockCollision(this.blockX, this.blockY + 1, this.blockMatrix)) {
                this.blockY++;
            } else {
                this.lockBlock();
            }
        }

        this.processMonsterTurns();
        this.updateUi();
    }

    processMonsterTurns() {
        if (this.player.hp <= 0) return;

        for (const m of this.monsters) {
            const dx = Math.abs(m.x - this.player.x);
            const dy = Math.abs(m.y - this.player.y);

            if (dx + dy === 1) {
                const dmg = Math.max(1, m.atk);
                this.damagePlayer(dmg, `${m.name} bites you!`);
                this.spawnParticle(this.player.x, this.player.y, `-${dmg}`, "#ef5350");
            } else if (dx + dy <= 5) {
                const sx = Math.sign(this.player.x - m.x);
                const sy = Math.sign(this.player.y - m.y);

                let nextX = m.x + sx;
                let nextY = m.y;

                if (!this.isValidMove(nextX, nextY) || this.getMonsterAt(nextX, nextY)) {
                    nextX = m.x;
                    nextY = m.y + sy;
                }

                if (this.isValidMove(nextX, nextY) && !this.getMonsterAt(nextX, nextY)) {
                    m.x = nextX;
                    m.y = nextY;
                }
            }
        }
    }

    damagePlayer(amount, reasonText) {
        this.player.takeDamage(amount);
        logMessage(`${reasonText} -${amount} HP`, "log-damage");
        if (this.player.hp <= 0) {
            this.handleDeath("HERO DEFEATED", "Your health pool dropped to zero.");
        }
    }

    handleDeath(titleText, reasonText) {
        document.getElementById("death-title").textContent = titleText;
        document.getElementById("death-reason").textContent = reasonText;
        document.getElementById("final-floor").textContent = this.dungeonLevel;
        document.getElementById("final-score").textContent = this.score;
        document.getElementById("game-over-modal").style.display = "flex";
    }

    isValidMove(x, y) {
        if (x < 0 || x >= CONFIG.COLS || y < 0 || y >= CONFIG.ROWS) return false;
        return this.map[x][y] === TILE.FLOOR || this.map[x][y] === TILE.STAIRS;
    }

    // ==========================================
    // INTERFACES & INPUT HANDLERS
    // ==========================================
    handleHeroMove(dx, dy) {
        if (this.player.hp <= 0) return;

        const nx = this.player.x + dx;
        const ny = this.player.y + dy;

        if (nx >= 0 && nx < CONFIG.COLS && ny >= 0 && ny < CONFIG.ROWS) {
            if (!this.isValidMove(nx, ny)) {
                logMessage("Cannot cross the deep abyss void!", "log-neutral");
                return;
            }

            const target = this.getMonsterAt(nx, ny);
            if (target) {
                target.hp -= this.player.atk;
                logMessage(`Hit ${target.name} for ${this.player.atk}.`, "log-success");
                this.spawnParticle(target.x, target.y, `-${this.player.atk}`, "#69f0ae");

                if (target.hp <= 0) {
                    this.score += 80;
                    this.monsters = this.monsters.filter(m => m !== target);
                    
                    const healBonus = this.player.heal(3);
                    if (healBonus > 0) {
                        this.spawnParticle(this.player.x, this.player.y, `+${healBonus} HP`, "#69f0ae");
                        logMessage(`Siphoned essence of ${target.name}! +${healBonus} HP`, "log-success");
                    } else {
                        logMessage(`Defeated ${target.name}!`, "log-success");
                    }
                }
                this.advanceTurn();
                return;
            }

            const item = this.getItemAt(nx, ny);
            if (item) {
                if (item.type === "heal") {
                    const healed = this.player.heal(item.statValue);
                    logMessage(`Recovered ${healed} HP.`, "log-success");
                    this.spawnParticle(nx, ny, `+${healed} HP`, "#69f0ae");
                } else if (item.type === "stat") {
                    this.player.atk += item.statValue;
                    logMessage(`ATK increased by +${item.statValue}.`, "log-success");
                    this.spawnParticle(nx, ny, `+${item.statValue} ATK`, "#ffd54f");
                }
                this.items = this.items.filter(i => i !== item);
            }

            this.player.x = nx;
            this.player.y = ny;

            if (this.map[nx][ny] === TILE.STAIRS) {
                this.dungeonLevel++;
                logMessage(`You step down the staircase deeper to floor ${this.dungeonLevel}!`, "log-success");
                this.resetDungeonState();
            } else {
                this.advanceTurn();
            }
        }
    }

    handleHeroWait() {
        if (this.player.hp <= 0) return;

        const nearbyMonster = this.monsters.some(m => Math.abs(m.x - this.player.x) <= 1 && Math.abs(m.y - this.player.y) <= 1);
        const healAmt = nearbyMonster ? 1 : 4; 
        
        const healed = this.player.heal(healAmt);
        if (healed > 0) {
            this.spawnParticle(this.player.x, this.player.y, `+${healed} HP`, "#69f0ae");
            logMessage(`Rested in safety. +${healed} HP.`, "log-success");
        } else {
            logMessage("You wait.", "log-neutral");
        }
        this.advanceTurn();
    }

    handleBlockLeft() {
        if (this.player.hp <= 0) return;
        if (!this.checkBlockCollision(this.blockX - 1, this.blockY, this.blockMatrix)) {
            this.blockX--;
            this.advanceTurn();
        }
    }

    handleBlockRight() {
        if (this.player.hp <= 0) return;
        if (!this.checkBlockCollision(this.blockX + 1, this.blockY, this.blockMatrix)) {
            this.blockX++;
            this.advanceTurn();
        }
    }

    handleBlockRotate() {
        if (this.player.hp <= 0) return;
        const rotated = this.rotateMatrix(this.blockMatrix);
        if (!this.checkBlockCollision(this.blockX, this.blockY, rotated)) {
            this.blockMatrix = rotated;
            this.advanceTurn();
        }
    }

    handleBlockSoftDrop() {
        if (this.player.hp <= 0) return;
        if (!this.checkBlockCollision(this.blockX, this.blockY + 1, this.blockMatrix)) {
            this.blockY++;
            this.advanceTurn();
        } else {
            this.lockBlock();
            this.advanceTurn();
        }
    }

    handleBlockDrop() {
        if (this.player.hp <= 0) return;
        while (!this.checkBlockCollision(this.blockX, this.blockY + 1, this.blockMatrix)) {
            this.blockY++;
        }
        this.lockBlock();
        this.advanceTurn();
    }

    getMonsterAt(x, y) { return this.monsters.find(m => m.x === x && m.y === y); }
    getItemAt(x, y) { return this.items.find(i => i.x === x && i.y === y); }

    spawnParticle(x, y, text, color) {
        this.particles.push(new Particle(x, y, text, color));
    }

    handleKeyboard(e) {
        switch (e.key) {
            case "w": case "ArrowUp": this.handleHeroMove(0, -1); break;
            case "s": case "ArrowDown": this.handleHeroMove(0, 1); break;
            case "a": case "ArrowLeft": this.handleHeroMove(-1, 0); break;
            case "d": case "ArrowRight": this.handleHeroMove(1, 0); break;
            case " ": this.handleHeroWait(); break;
            
            case "j": this.handleBlockLeft(); break;
            case "l": this.handleBlockRight(); break;
            case "i": this.handleBlockRotate(); break;
            case "s": this.handleBlockSoftDrop(); break;
            case "k": this.handleBlockDrop(); break;
        }
    }

    // ==========================================
    // CANVAS RENDERING ENGINE
    // ==========================================
    startLoop() {
        const loop = () => {
            if (!this.active) return; 
            this.draw();
            requestAnimationFrame(loop);
        };
        requestAnimationFrame(loop);
    }

    draw() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

        this.ctx.fillStyle = "#030305";
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        // Draw Map tiles
        for (let x = 0; x < CONFIG.COLS; x++) {
            for (let y = 0; y < CONFIG.ROWS; y++) {
                const type = this.map[x][y];
                if (type === TILE.FLOOR || type === TILE.STAIRS) {
                    this.ctx.fillStyle = this.colors[x][y] || "#444";
                    this.ctx.fillRect(x * CONFIG.TILE_SIZE, y * CONFIG.TILE_SIZE, CONFIG.TILE_SIZE - 1, CONFIG.TILE_SIZE - 1);
                    this.ctx.strokeStyle = "rgba(0,0,0,0.2)";
                    this.ctx.strokeRect(x * CONFIG.TILE_SIZE, y * CONFIG.TILE_SIZE, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE);

                    if (type === TILE.STAIRS) {
                        this.ctx.font = `${CONFIG.TILE_SIZE * 0.7}px Arial`;
                        this.ctx.fillText("🪜", x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2);
                    }
                } else {
                    this.ctx.fillStyle = "#06060a";
                    this.ctx.fillRect(x * CONFIG.TILE_SIZE, y * CONFIG.TILE_SIZE, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE);
                    this.ctx.strokeStyle = "#0d0d14";
                    this.ctx.strokeRect(x * CONFIG.TILE_SIZE, y * CONFIG.TILE_SIZE, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE);
                }
            }
        }

        this.ctx.textBaseline = "middle";
        this.ctx.textAlign = "center";
        
        // Draw Falling Active Block
        for (let r = 0; r < this.blockMatrix.length; r++) {
            for (let c = 0; c < this.blockMatrix[r].length; c++) {
                const cell = this.blockMatrix[r][c];
                if (cell !== CELL_STATE.EMPTY) {
                    const tx = this.blockX + c;
                    const ty = this.blockY + r;

                    if (tx >= 0 && tx < CONFIG.COLS && ty >= 0 && ty < CONFIG.ROWS) {
                        this.ctx.fillStyle = this.blockColor;
                        this.ctx.fillRect(tx * CONFIG.TILE_SIZE, ty * CONFIG.TILE_SIZE, CONFIG.TILE_SIZE - 1, CONFIG.TILE_SIZE - 1);
                        this.ctx.strokeStyle = "#fff";
                        this.ctx.strokeRect(tx * CONFIG.TILE_SIZE, ty * CONFIG.TILE_SIZE, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE);

                        this.ctx.font = `${CONFIG.TILE_SIZE * 0.7}px Arial`;
                        if (cell === CELL_STATE.MONSTER_RAT) {
                            this.ctx.fillText("🐀", tx * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, ty * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2);
                        } else if (cell === CELL_STATE.MONSTER_SKEL) {
                            this.ctx.fillText("💀", tx * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, ty * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2);
                        } else if (cell === CELL_STATE.ITEM_POTION) {
                            this.ctx.fillText("🧪", tx * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, ty * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2);
                        } else if (cell === CELL_STATE.ITEM_SWORD) {
                            this.ctx.fillText("🗡️", tx * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, ty * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2);
                        } else if (cell === CELL_STATE.STAIRS) {
                            this.ctx.fillText("🪜", tx * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, ty * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2);
                        }
                    }
                }
            }
        }

        // Draw static Floor Items
        this.ctx.font = `${CONFIG.TILE_SIZE * 0.75}px Arial`;
        for (const item of this.items) {
            this.ctx.fillText(item.char, item.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, item.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2);
        }

        // Draw active Monsters
        for (const m of this.monsters) {
            this.ctx.fillText(m.char, m.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, m.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2);
        }

        // Draw Player
        if (this.player.hp > 0) {
            this.ctx.fillText(this.player.char, this.player.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2, this.player.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2);
        }

        // Draw Particles
        for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i];
            p.update();
            p.draw(this.ctx);
            if (p.life <= 0) this.particles.splice(i, 1);
        }
    }

    updateUi() {
        const currentGravityRate = Math.max(1, 4 - Math.floor(this.dungeonLevel / 2));
        document.getElementById("stat-floor").textContent = this.dungeonLevel;
        document.getElementById("stat-score").textContent = this.score;
        document.getElementById("stat-hp").textContent = `${this.player.hp}/${this.player.maxHp}`;
        document.getElementById("stat-rate").textContent = currentGravityRate;
        document.getElementById("next-preview-box").innerHTML = NEXT_PREVIEWS[this.nextType];

        const hpPct = (this.player.hp / this.player.maxHp) * 100;
        document.getElementById("hp-bar").style.width = `${Math.max(0, hpPct)}%`;
    }
}

function logMessage(text, className = "log-neutral") {
    const log = document.getElementById("log-panel");
    const div = document.createElement("div");
    div.className = `log-entry ${className}`;
    div.innerText = text;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
}

// Global scope manager
let game = new Game();

function restartRun() {
    document.getElementById("game-over-modal").style.display = "none";
    game = new Game();
    logMessage("--- Fresh Rift Opened! Good Luck ---", "log-success");
}
</script>
