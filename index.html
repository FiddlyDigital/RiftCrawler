<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Rift Crawler — a mobile-first tetris-roguelike hybrid dungeon crawler. Build floors with falling blocks and survive the dungeon." />
  <title>Rift Crawler</title>
  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />

  <!-- Plausible Analytics (optional): uncomment and replace your-domain.com -->
  <!-- <script defer data-domain="your-domain.com" src="https://plausible.io/js/script.js"></script> -->
</head>
<body>

<div id="game-wrapper">
  <div id="viewport-split">
    <div id="canvas-container">
      <canvas id="gameCanvas"></canvas>
    </div>

    <div id="sidebar-panel">
      <div class="sidebar-card">
        <div class="card-title">Hero Status</div>
        <div style="font-weight: bold;">❤️ HP: <span id="stat-hp">35/35</span></div>
        <div class="hp-bar-container">
          <div id="hp-bar" class="hp-bar-fill"></div>
        </div>
        <div style="margin-top: 3px;">🪜 Floor: <span id="stat-floor">1</span></div>
        <div style="margin-top: 2px; font-size: 9px; color:#aaa;">Tick Rate: <span id="stat-rate">3</span> Act</div>
      </div>

      <div class="sidebar-card">
        <div class="card-title">Score</div>
        <div style="font-size: 12px; font-weight: bold; color: var(--accent-color);" id="stat-score">0</div>
        <div style="font-size: 9px; color: #888; margin-top: 2px;">Best: <span id="best-score">0</span></div>
      </div>

      <div class="sidebar-card">
        <div class="card-title">Next Piece</div>
        <div id="next-preview-box">Loading...</div>
      </div>

      <div class="sidebar-card" style="flex-grow: 1; display: flex; flex-direction: column;">
        <div class="card-title">Dungeon Feed</div>
        <div id="log-panel"></div>
      </div>
    </div>
  </div>

  <!-- Twin D-PAD controllers — actions wired in input.ts via data attributes -->
  <div id="controls-layout">
    <div class="dpad-container">
      <div class="dpad-title" style="color: var(--block-accent)">Block (Tetris)</div>
      <div class="dpad-grid">
        <div class="dpad-empty"></div>
        <button class="dpad-btn block-btn" data-action="block-rotate" aria-label="Rotate block">🔄</button>
        <div class="dpad-empty"></div>

        <button class="dpad-btn block-btn" data-action="block-left" aria-label="Move block left">◀</button>
        <button class="dpad-btn block-btn" data-action="block-drop" aria-label="Hard drop block" style="background-color: #0d47a1; color:#fff;">⏬</button>
        <button class="dpad-btn block-btn" data-action="block-right" aria-label="Move block right">▶</button>

        <div class="dpad-empty"></div>
        <button class="dpad-btn block-btn" data-action="block-softdrop" aria-label="Soft drop block">▼</button>
        <div class="dpad-empty"></div>
      </div>
    </div>

    <div class="dpad-container">
      <div class="dpad-title" style="color: var(--hero-accent)">Hero (Rogue)</div>
      <div class="dpad-grid">
        <div class="dpad-empty"></div>
        <button class="dpad-btn hero-btn" data-action="hero-move" data-dx="0" data-dy="-1" aria-label="Move hero up">▲</button>
        <div class="dpad-empty"></div>

        <button class="dpad-btn hero-btn" data-action="hero-move" data-dx="-1" data-dy="0" aria-label="Move hero left">◀</button>
        <button class="dpad-btn hero-btn hero-wait-btn" data-action="hero-wait" aria-label="Wait / heal">⏺</button>
        <button class="dpad-btn hero-btn" data-action="hero-move" data-dx="1" data-dy="0" aria-label="Move hero right">▶</button>

        <div class="dpad-empty"></div>
        <button class="dpad-btn hero-btn" data-action="hero-move" data-dx="0" data-dy="1" aria-label="Move hero down">▼</button>
        <div class="dpad-empty"></div>
      </div>
    </div>
  </div>
</div>

<!-- Game Over modal -->
<div id="game-over-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="death-title">
  <div class="modal-card">
    <div class="modal-title" id="death-title">DUNGEON COLLAPSE</div>
    <p style="color: #888; margin: 5px 0 15px 0;" id="death-reason">Dungeon ceiling collapsed.</p>
    <div style="text-align: left; padding: 10px; background-color: #0c0c12; border-radius: 4px; font-size: 13px;">
      <p style="margin: 4px 0;">🪜 Depth Floor: <b id="final-floor" style="color: var(--accent-color);">1</b></p>
      <p style="margin: 4px 0;">🏆 Final Score: <b id="final-score" style="color: var(--accent-color);">0</b></p>
      <p style="margin: 4px 0;">⭐ High Score: <b id="high-score" style="color: var(--accent-color);">0</b></p>
    </div>
    <button class="restart-btn" id="restart-btn">Try Again</button>
  </div>
</div>

<!-- PWA install nudge -->
<div id="install-banner" hidden>
  <span>📲 Add Rift Crawler to your home screen</span>
  <button id="install-btn">Install</button>
  <button id="install-dismiss" aria-label="Dismiss">✕</button>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
