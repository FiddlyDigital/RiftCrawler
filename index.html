<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
  <!-- viewport-fit=cover: required for env(safe-area-inset-*) to report real
       values in standalone/PWA mode — without it they're 0 and the bottom
       touch controls sit behind the iPhone home-indicator bar. The game
       wrapper pads all four edges with max(10px, env(safe-area-inset-*)). -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="Causeway to Ériu — a mobile-first tetris-roguelike hybrid dungeon crawler." />
  <meta name="theme-color" content="#08090a" />
  <title>Causeway to Ériu</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Causeway" />
  <!-- <script defer data-domain="your-domain.com" src="https://plausible.io/js/script.js"></script> -->
</head>
<body>

<div id="game-wrapper">
  <div id="inspect-tooltip" class="inspect-tooltip" hidden></div>
  <div id="canvas-container">
      <canvas id="gameCanvas"></canvas>
      <div id="toast-banner" class="toast-banner" role="status" aria-live="polite"></div>
      <button id="drawer-toggle-btn" aria-label="Open menu" title="Menu">☰</button>
      <button id="fullscreen-btn" aria-label="Enter fullscreen" title="Fullscreen" hidden>⛶</button>
      <button id="pause-btn" aria-label="Pause / settings" title="Pause (Esc)">⏸</button>
      <div id="hud-strip">
        <div class="hud-hp-block">
          <span id="hud-hp-text">35/35</span>
          <div class="hud-hp-bar-container"><div id="hud-hp-bar" class="hp-bar-fill"></div></div>
        </div>
        <div class="hud-floor"><span class="spr" data-sprite="tile_stairs_up" data-size="14"></span> <span id="hud-floor-num">1</span></div>
        <div class="hud-gold"><span class="spr" data-sprite="item_coins" data-size="14"></span> <span id="hud-gold-num">0</span></div>
        <div id="hud-floor-progress" class="hud-floor-progress"></div>
        <div id="hud-next-preview" class="hud-next-preview"></div>
      </div>
    </div>

    <div id="sidebar-backdrop"></div>

    <div id="sidebar-panel">
      <div id="sidebar-game-title">CAUSEWAY TO ÉRIU</div>

      <!-- Hero status -->
      <div class="sidebar-card">
        <div class="card-title">Hero Status</div>
        <div style="font-weight:bold;"><span class="spr" data-sprite="icon_hp_potion" data-size="14"></span> <span id="stat-hp">35/35</span></div>
        <div class="hp-bar-container">
          <div id="hp-bar" class="hp-bar-fill"></div>
        </div>
        <div style="margin-top:3px;"><span class="spr" data-sprite="tile_stairs_up" data-size="14"></span> Floor: <span id="stat-floor">1</span></div>
        <div style="margin-top:2px;"><span class="spr" data-sprite="item_coins" data-size="14"></span> Gold: <span id="stat-gold">0</span></div>
        <div style="margin-top:2px;font-size:9px;color:#aaa;">Speed: <span id="stat-rate">1.5s/turn</span></div>
        <div id="stat-floor-progress" style="margin-top:3px;font-size:9px;color:#aaa;"></div>
      </div>

      <!-- Ogham Marks -->
      <div class="sidebar-card">
        <div class="card-title">Ogham Marks <span id="brand-count" style="color:#888;font-weight:normal;"></span></div>
        <div id="brand-panel" class="boon-grid">—</div>
      </div>

      <!-- Geasa -->
      <div class="sidebar-card">
        <div class="card-title">Geasa</div>
        <div id="boon-panel" class="boon-grid">—</div>
        <div id="status-row"  style="margin-top:3px;display:flex;flex-wrap:wrap;gap:2px;"></div>
        <div id="active-modifier-badge" style="display:none;margin-top:3px;font-size:9px;color:var(--accent-color);"></div>
        <div id="active-class-badge"    style="display:none;margin-top:2px;font-size:9px;color:#8d6fd4;"></div>
        <div id="difficulty-badge"      style="display:none;margin-top:2px;font-size:9px;color:#5b9a68;"></div>
        <div id="biome-badge"           style="display:none;margin-top:2px;font-size:9px;color:#26a69a;"></div>
        <div id="omen-badge"            style="display:none;margin-top:2px;font-size:9px;color:#d9a441;"></div>
        <div id="ranged-ability-badge"  style="display:none;margin-top:4px;"></div>
        <button id="char-sheet-btn" class="char-sheet-open-btn">📜 Character Sheet</button>
        <button id="codex-btn" class="char-sheet-open-btn">📖 Codex</button>
      </div>

      <!-- Experience + XP Earned -->
      <div class="sidebar-card">
        <div class="card-title">Experience</div>
        <div style="display:flex;justify-content:space-between;align-items:baseline;">
          <span id="player-level" style="font-size:12px;font-weight:bold;color:var(--accent-color);">Lv.1</span>
          <span id="stat-xp-total" style="font-size:12px;font-weight:bold;color:var(--accent-color);">0</span>
        </div>
        <div class="xp-bar-container" style="margin-top:3px;">
          <div id="xp-bar" class="xp-bar-fill"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:2px;">
          <span id="xp-label" style="font-size:9px;color:#888;">0/50 XP</span>
          <span style="font-size:9px;color:#888;">Best: <span id="best-score">0</span></span>
        </div>
      </div>

      <!-- Next piece + Hold -->
      <div class="sidebar-card">
        <div class="card-title">Pieces</div>
        <div style="display:flex;gap:8px;align-items:flex-start;">
          <div style="flex:1;">
            <div style="font-size:8px;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;">Hold<span class="kbd-hint"> (H)</span></div>
            <div id="held-preview-box" style="min-height:20px;opacity:0.5;">—</div>
          </div>
          <div style="flex:1;">
            <div style="font-size:8px;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;">Next</div>
            <div id="next-preview-box">Loading...</div>
          </div>
        </div>
        <div id="piece-state-badge" style="display:none;margin-top:4px;font-size:9px;"></div>
      </div>

      <!-- Dungeon feed -->
      <div class="sidebar-card" style="flex-grow:1;display:flex;flex-direction:column;">
        <div class="card-title">Dungeon Feed</div>
        <div id="log-panel"></div>
      </div>
    </div>

  <!-- Twin D-PAD controllers -->
  <div id="controls-layout">
    <div class="dpad-container">
      <div class="dpad-title" style="color:var(--block-accent)">Block (Tetris)</div>
      <div class="dpad-grid">
        <div class="dpad-empty"></div>
        <button class="dpad-btn block-btn" data-action="block-rotate"   aria-label="Rotate block">🔄</button>
        <div class="dpad-empty"></div>
        <button class="dpad-btn block-btn" data-action="block-left"     aria-label="Move block left">◀</button>
        <button class="dpad-btn block-btn" data-action="block-drop"     aria-label="Hard drop block" style="background-color:#0d47a1;color:#fff;">⏬</button>
        <button class="dpad-btn block-btn" data-action="block-right"    aria-label="Move block right">▶</button>
        <div class="dpad-empty"></div>
        <button class="dpad-btn block-btn" data-action="block-softdrop" aria-label="Soft drop block">▼</button>
        <div class="dpad-empty"></div>
      </div>
      <button class="dpad-btn block-btn dpad-action-btn" data-action="block-hold"
              aria-label="Hold piece (H)">◫ HOLD<span class="kbd-hint">&nbsp;(H)</span></button>
    </div>

    <div class="dpad-container">
      <div class="dpad-title" style="color:var(--hero-accent)">Hero (Rogue)</div>
      <div class="dpad-grid">
        <div class="dpad-empty"></div>
        <button class="dpad-btn hero-btn" data-action="hero-move" data-dx="0"  data-dy="-1" aria-label="Move hero up">▲</button>
        <div class="dpad-empty"></div>
        <button class="dpad-btn hero-btn" data-action="hero-move" data-dx="-1" data-dy="0"  aria-label="Move hero left">◀</button>
        <button class="dpad-btn hero-btn hero-wait-btn" data-action="hero-wait"              aria-label="Wait / heal">⏺</button>
        <button class="dpad-btn hero-btn" data-action="hero-move" data-dx="1"  data-dy="0"  aria-label="Move hero right">▶</button>
        <div class="dpad-empty"></div>
        <button class="dpad-btn hero-btn" data-action="hero-move" data-dx="0"  data-dy="1"  aria-label="Move hero down">▼</button>
        <div class="dpad-empty"></div>
      </div>
      <button id="ranged-btn" class="dpad-btn hero-btn dpad-action-btn" data-action="hero-ranged"
              aria-label="Use ranged ability (Q)"
              style="opacity:0.4;"
              disabled>Special</button>
      <button id="spell-cycle-btn" class="dpad-btn hero-btn dpad-action-btn" data-action="spell-cycle"
              aria-label="Switch spell (E)"
              style="display:none;">⇆ Spell</button>
    </div>
  </div>
</div>

<!-- Start / how-to-play screen -->
<start-modal id="start-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="start-title" style="display:flex;"></start-modal>

<!-- Crash recovery -->
<crash-modal id="crash-modal" class="modal-overlay" role="alertdialog" aria-modal="true" aria-labelledby="crash-title"></crash-modal>

<!-- Game Over modal -->
<game-over-modal id="game-over-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="death-title"></game-over-modal>

<!-- Run modifier pick modal -->
<modifier-modal id="modifier-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modifier-title"></modifier-modal>

<!-- Boss warning cinematic -->
<boss-warning-modal id="boss-warning-modal" class="modal-overlay" role="dialog" aria-modal="true"></boss-warning-modal>

<!-- Class selection modal -->
<class-modal id="class-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="class-title"></class-modal>

<!-- Difficulty selection modal -->
<difficulty-modal id="difficulty-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="difficulty-title"></difficulty-modal>

<!-- Wandering peddler shop -->
<shop-modal id="shop-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="shop-title"></shop-modal>

<!-- Altar / Tattoo Artist modal (reused) -->
<offer-modal id="altar-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="altar-title"></offer-modal>

<!-- Character sheet: aggregated totals from boons + brands + shop purchases -->
<char-sheet-modal id="char-sheet-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="char-sheet-title"></char-sheet-modal>

<!-- Lore codex: every boss/NPC/biome/patron discovered across all runs, persisted across sessions -->
<codex-modal id="codex-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="codex-title"></codex-modal>

<!-- Floor event modal -->
<floor-event-modal id="floor-event-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="floor-event-title"></floor-event-modal>

<!-- Pause / settings menu -->
<pause-modal id="pause-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="pause-title"></pause-modal>

<!-- Keyboard controls remap (from the pause menu) -->
<controls-modal id="controls-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="controls-title"></controls-modal>

<!-- Gamepad indicator -->
<div id="gamepad-indicator" style="display:none;text-align:center;font-size:10px;color:#888;padding:4px 0;">🎮 Controller active</div>

<!-- PWA install nudge -->
<div id="install-banner" hidden>
  <span>📲 Add Causeway to Ériu to your home screen</span>
  <button id="install-btn">Install</button>
  <button id="install-dismiss" aria-label="Dismiss">✕</button>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
