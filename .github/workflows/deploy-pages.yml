name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel one that's already live-deploying.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Validate game data against schemas
        run: npm run validate-data

      - name: Unit tests with coverage thresholds
        run: npm run test:coverage

      # Reads the repo's actual Pages configuration (project page vs. custom
      # domain) so the built asset paths are correct either way, instead of
      # hardcoding the repo name as the base path.
      - name: Detect Pages base path
        id: pages
        uses: actions/configure-pages@v5

      # Every deploy gets an auto-incrementing version (1.0.<run number>),
      # baked into the bundle via Vite define and shown on the start screen
      # and pause menu — so players and bug reports can name the exact build.
      - name: Build
        run: npm run build -- --base="${{ steps.pages.outputs.base_path }}/"
        env:
          APP_VERSION: 1.0.${{ github.run_number }}

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(node -p "require('playwright/package.json').version")" >> "$GITHUB_OUTPUT"

      # Browsers are keyed on the Playwright version: a cache hit skips the
      # ~1 min download entirely; the (much faster) OS package step still runs
      # on hits because apt packages don't live in the cached directory.
      - name: Cache Playwright Chromium
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # The last gate before going live: boot the actual production build in
      # headless Chromium and play the first seconds of a real run.
      - name: Smoke test the built app
        run: npm run smoke

      - name: Version summary
        run: echo "Deployed **v1.0.${{ github.run_number }}** (commit ${GITHUB_SHA::7})" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
