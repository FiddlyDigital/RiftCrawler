name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      # ── Deploy to Cloudflare Pages (push to main only) ────────────────────
      # Prerequisites: add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID
      # to your repository's Settings → Secrets and variables → Actions.
      # Then create a Cloudflare Pages project named "rift-crawler".
      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: rift-crawler
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
