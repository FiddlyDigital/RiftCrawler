name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Validate game data against schemas
        run: npm run validate-data

      - name: Unit tests with coverage thresholds
        run: npm run test:coverage

      - name: Build
        run: npm run build
        env:
          APP_VERSION: pr-${{ github.event.pull_request.number || 'manual' }}.${{ github.run_number }}

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(node -p "require('playwright/package.json').version")" >> "$GITHUB_OUTPUT"

      # Browsers are keyed on the Playwright version: a cache hit skips the
      # ~1 min download entirely; the (much faster) OS package step still runs
      # on hits because apt packages don't live in the cached directory.
      - name: Cache Playwright Chromium
        id: pw-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Smoke test the built app
        run: npm run smoke

      - name: Coverage summary
        if: always()
        run: |
          echo "### Coverage" >> "$GITHUB_STEP_SUMMARY"
          npx vitest run --coverage 2>/dev/null | sed -n '/Coverage summary/,/====$/p' >> "$GITHUB_STEP_SUMMARY" || true
