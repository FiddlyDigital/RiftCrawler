name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Validate game data against schemas
        run: npm run validate-data

      - name: Unit tests with coverage thresholds
        run: npm run test:coverage

      - name: Build
        run: npm run build
        env:
          APP_VERSION: pr-${{ github.event.pull_request.number || 'manual' }}.${{ github.run_number }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Smoke test the built app
        run: npm run smoke

      - name: Coverage summary
        if: always()
        run: |
          echo "### Coverage" >> "$GITHUB_STEP_SUMMARY"
          npx vitest run --coverage 2>/dev/null | sed -n '/Coverage summary/,/====$/p' >> "$GITHUB_STEP_SUMMARY" || true
